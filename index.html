<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GOATSOFAI Browser Inference</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.0.1-alpha.10/dist/tf-tflite.min.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div>
          <h1>GOATSOFAI</h1>
          <p id="status">Loading model...</p>
        </div>
        <button id="toggleCamera" type="button">Switch Camera</button>
      </header>

      <section class="stage">
        <div class="preview">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <aside class="panel">
          <div class="metric">
            <span>Model</span>
            <strong>Unified 416 baseline</strong>
          </div>
          <div class="metric">
            <span>Measured accuracy</span>
            <strong>90.58%</strong>
          </div>
          <div class="metric">
            <span>Last result</span>
            <strong id="label">-</strong>
          </div>
          <div class="metric">
            <span>Confidence</span>
            <strong id="confidence">-</strong>
          </div>
          <div class="actions">
            <button id="loadModel" type="button">Load Model</button>
            <button id="capture" type="button">Run Scan</button>
            <button id="autoScan" type="button">Auto Scan</button>
          </div>
          <pre id="debug"></pre>
        </aside>
      </section>

      <canvas id="inputCanvas" width="416" height="416"></canvas>
    </main>
    <script src="app.js?v=2"></script>
  </body>
</html>
